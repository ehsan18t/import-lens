[package]
name = "import-lens-daemon"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "import-lens-daemon"
path = "src/main.rs"

[dependencies]
brotli = "^8"
flate2 = "^1.1"
oxc_allocator = "~0.133"
oxc_ast = "~0.133"
oxc_codegen = "~0.133"
oxc_mangler = "~0.133"
oxc_minifier = "~0.133"
oxc_parser = "~0.133"
oxc_resolver = "~11.19"
oxc_semantic = "~0.133"
oxc_span = "~0.133"
oxc_syntax = "~0.133"
oxc_transformer = "~0.133"
papaya = "~0.2"
rayon = "^1.12"
redb = "^4"
rmp-serde = "^1.3"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
tokio = { version = "^1.52", features = ["rt-multi-thread", "net", "io-util", "macros", "signal", "time"] }
zstd = "~0.13"

[dev-dependencies]
zip = "^2"
