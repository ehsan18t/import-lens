[package]
name = "import-lens-daemon"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "import-lens-daemon"
path = "src/main.rs"

[dependencies]
brotli = "^8"
flate2 = "^1.1"
papaya = "~0.2"
rayon = "^1.12"
redb = "^4"
rmp-serde = "^1.3"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
tokio = { version = "^1.52", features = ["rt-multi-thread", "net", "io-util", "macros", "signal", "time"] }
zstd = "~0.13"

