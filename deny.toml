# Import Lens - cargo-deny configuration
# Audits dependencies for security vulnerabilities, license issues, and bans.
# Run: cargo deny check
# Install: cargo install cargo-deny

[advisories]
# Only flag unmaintained advisories for our own (workspace) dependencies, not the
# whole transitive tree; matches are still denied. Vulnerabilities, yanked crates,
# and notices are denied by default in cargo-deny 0.19+.
unmaintained = "workspace"
ignore = []

[licenses]
# Only allow these licenses - anything unlisted is denied by default.
# Benchmark-only tooling such as Gungraun must satisfy the same allowlist.
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-3.0",
  "Zlib",
  # Permissive licenses present in the current transitive tree.
  "BSD-2-Clause",         # arrayref, fast-glob (rolldown's transitive tree)
  "BSD-3-Clause",         # brotli, alloc-no-stdlib/alloc-stdlib, subtle
  "ISC",                  # rustls, ring, rustls-webpki, untrusted, hmac-sha1-compact
  "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA bundle data)
  "BSL-1.0",              # xxhash-rust (Boost Software License 1.0)
  # Weak, file-level copyleft. Safe to ship as an unmodified library: MPL-2.0 covers
  # modifications to the MPL'd files themselves, not code that merely depends on them.
  "MPL-2.0",              # lightningcss + its Servo-derived cssparser / parcel_selectors (CSS asset sizing, B2)
]

[bans]
# Deny duplicate versions of the same crate (keeps binary small)
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# No known transitive duplicates yet - add skip entries here as needed.
skip = []

# Ban known-problematic crates
deny = [
  # openssl - we don't need it and it's a security liability
  { crate = "openssl", use-instead = "rustls" },
  { crate = "openssl-sys", use-instead = "rustls" },
]

[sources]
# Only allow crates from crates.io - no random git repos
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
