name: Build
run-name: Build ${{ inputs.version && format('v{0}', inputs.version) || 'from package.json' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Leave blank to use package.json; a value overrides it."
        required: false
        type: string
      force:
        description: "Rebuild every target, ignoring cached artifacts."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# One Build at a time: starting a new run cancels the one in progress. Any
# targets the cancelled run already cached are reused by the new run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # Resolve the version once and run the full release-gate validation (perf +
  # coverage on top of the shared checks). Its output feeds every package job.
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      requested_version: ${{ inputs.version }}
      run_performance: true
      run_coverage: true
      # A release must not ship without the real-package correctness gates.
      run_candidate_packages: true

  # The target list, their runners and their Rust triples all live in
  # scripts/targets.mjs and scripts/ci-matrix.mjs. Adding a target is a one-line
  # change there, not a four-place edit.
  targets:
    name: Resolve target matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Resolve matrix
        id: resolve
        run: echo "matrix=$(node scripts/ci-matrix.mjs)" >> "$GITHUB_OUTPUT"

  package:
    name: Package ${{ matrix.target }}
    needs: [validate, targets]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.targets.outputs.matrix) }}

    env:
      VSIX_PATH: dist/vsix/import-lens-${{ matrix.target }}-${{ needs.validate.outputs.version }}.vsix

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # Skip the restore entirely when forcing a rebuild, so a stale cache never
      # short-circuits the build.
      - name: Restore cached VSIX
        id: cache
        if: ${{ !inputs.force }}
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ env.VSIX_PATH }}
          # vsix-v2: the cached path moved from builds/ to dist/vsix; the old
          # namespace would restore to the old path and fail the upload.
          key: vsix-v2-${{ matrix.target }}-${{ needs.validate.outputs.version }}

      # Everything below only runs when we actually need to build this target
      # (cache miss, or force). On a cache hit the restored VSIX is uploaded as-is.
      # No version input: pnpm/action-setup reads packageManager from package.json.
      - name: Install pnpm
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: pnpm/action-setup@v6.0.9

      - name: Install Node.js
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.rust-target }}

      # Cache the release compile per target, so a first build, a forced rebuild,
      # or re-running to fill a failed platform doesn't recompile oxc from cold.
      - name: Cache Rust build
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.rust-target }}

      - name: Install dependencies
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: pnpm install --frozen-lockfile

      # Bake the resolved version into package.json so vsce packages it (and names
      # the VSIX) as that version. A no-op when the input matched package.json.
      - name: Set version
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          RESOLVED_VERSION: ${{ needs.validate.outputs.version }}
        run: node scripts/set-version.mjs "$RESOLVED_VERSION"

      - name: Package VSIX
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: pnpm run package:${{ matrix.target }}

      - name: Save VSIX to cache
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: ${{ env.VSIX_PATH }}
          # vsix-v2: the cached path moved from builds/ to dist/vsix; the old
          # namespace would restore to the old path and fail the upload.
          key: vsix-v2-${{ matrix.target }}-${{ needs.validate.outputs.version }}

      # Always upload, whether the VSIX was restored from cache or freshly built,
      # so this run's artifact set accumulates to the full six targets.
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: import-lens-${{ matrix.target }}-${{ needs.validate.outputs.version }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error
          retention-days: 1
