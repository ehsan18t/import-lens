name: Build
run-name: Build ${{ inputs.version && format('v{0}', inputs.version) || 'from package.json' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Leave blank to use package.json; a value overrides it."
        required: false
        type: string
      force:
        description: "Rebuild every target, ignoring cached artifacts."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# One Build at a time: starting a new run cancels the one in progress. Any
# targets the cancelled run already cached are reused by the new run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 11.9.0

jobs:
  # Resolve the version once and run the full release-gate validation (perf +
  # coverage on top of the shared checks). Its output feeds every package job.
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      requested_version: ${{ inputs.version }}
      run_performance: true
      run_coverage: true

  package:
    name: Package ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - target: win32-arm64
            runner: windows-latest
            rust-target: aarch64-pc-windows-msvc
          - target: linux-x64
            runner: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - target: darwin-x64
            runner: macos-latest
            rust-target: x86_64-apple-darwin
          - target: darwin-arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin

    env:
      VSIX_PATH: builds/import-lens-${{ matrix.target }}-${{ needs.validate.outputs.version }}.vsix

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # Skip the restore entirely when forcing a rebuild, so a stale cache never
      # short-circuits the build.
      - name: Restore cached VSIX
        id: cache
        if: ${{ !inputs.force }}
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ env.VSIX_PATH }}
          key: vsix-${{ matrix.target }}-${{ needs.validate.outputs.version }}

      # Everything below only runs when we actually need to build this target
      # (cache miss, or force). On a cache hit the restored VSIX is uploaded as-is.
      - name: Install pnpm
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.rust-target }}

      # Cache the release compile per target, so a first build, a forced rebuild,
      # or re-running to fill a failed platform doesn't recompile oxc from cold.
      - name: Cache Rust build
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.rust-target }}

      - name: Install dependencies
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: pnpm install --frozen-lockfile

      # Bake the resolved version into package.json so vsce packages it (and names
      # the VSIX) as that version. A no-op when the input matched package.json.
      - name: Set version
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          RESOLVED_VERSION: ${{ needs.validate.outputs.version }}
        run: node scripts/set-version.mjs "$RESOLVED_VERSION"

      - name: Package VSIX
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        run: pnpm run package:${{ matrix.target }}

      - name: Save VSIX to cache
        if: ${{ inputs.force || steps.cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: ${{ env.VSIX_PATH }}
          key: vsix-${{ matrix.target }}-${{ needs.validate.outputs.version }}

      # Always upload, whether the VSIX was restored from cache or freshly built,
      # so this run's artifact set accumulates to the full six targets.
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: import-lens-${{ matrix.target }}-${{ needs.validate.outputs.version }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error
          retention-days: 1
