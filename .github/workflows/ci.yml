name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Commit-message validation lives in commit-messages.yml (PR-only) so it does
  # not surface as a skipped check on pushes to main.
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      run_accuracy: true
