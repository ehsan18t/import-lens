name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave blank to use package.json; must match a completed Build run."
        required: false
        type: string
      release_github:
        description: "Create the draft GitHub release."
        required: false
        default: true
        type: boolean
      publish_vscode:
        description: "Publish to the Visual Studio Marketplace (requires VSCE_PAT)."
        required: false
        default: false
        type: boolean
      publish_openvsx:
        description: "Publish to Open VSX (requires OVSX_PAT)."
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Validate and preview the changelog without creating or publishing anything."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL }}
      AI_MODEL: ${{ vars.AI_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      # Resolve the version once: a blank input falls back to package.json, a
      # value overrides it. Everything downstream keys off RELEASE_VERSION.
      - name: Resolve version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          version="$(node scripts/resolve-version.mjs "$REQUESTED_VERSION")"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"
          echo "Resolved release version: $version"

      # Fail fast, before any expensive download, if the request can't succeed.
      - name: Preflight
        run: |
          github='${{ inputs.release_github }}'
          vscode='${{ inputs.publish_vscode }}'
          openvsx='${{ inputs.publish_openvsx }}'

          if [ "$github" != "true" ] && [ "$vscode" != "true" ] && [ "$openvsx" != "true" ]; then
            echo "::error::No destination selected. Enable at least one of release_github, publish_vscode, publish_openvsx."
            exit 1
          fi

          if [ "$vscode" = "true" ] && [ -z "${VSCE_PAT:-}" ]; then
            echo "::error::publish_vscode is selected but the VSCE_PAT secret is not configured."
            exit 1
          fi

          if [ "$openvsx" = "true" ] && [ -z "${OVSX_PAT:-}" ]; then
            echo "::error::publish_openvsx is selected but the OVSX_PAT secret is not configured."
            exit 1
          fi

          echo "Preflight passed."

      # No version input: pnpm/action-setup reads packageManager from package.json.
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Correlate to the Build run by the version-stamped artifact it produced,
      # not by run name (which no longer carries the version when the Build input
      # was left blank). Pick the newest matching run if a version was rebuilt.
      - name: Locate build run
        id: buildrun
        run: |
          artifact="import-lens-win32-x64-${RELEASE_VERSION}"
          # gh api rejects --slurp together with --jq, so emit one run id per
          # line (per page) and take the max across all pages with sort.
          run_id=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${artifact}" \
            --jq '.artifacts[].workflow_run.id' | sort -n | tail -n 1)
          if [ -z "$run_id" ]; then
            echo "::error::No Build artifact ${artifact} found. Run the Build workflow for ${RELEASE_VERSION} first."
            exit 1
          fi
          echo "Using build run $run_id."
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: import-lens-*-${{ env.RELEASE_VERSION }}
          path: dist/vsix
          merge-multiple: true
          run-id: ${{ steps.buildrun.outputs.run_id }}
          github-token: ${{ github.token }}

      # The expected artifact names come from scripts/targets.mjs. An inline
      # `node --input-type=module` heredoc cannot import a relative path -- stdin
      # has no base URL to resolve against -- so the list is read through the
      # script rather than imported here.
      #
      # The list is captured into a variable, NOT piped from a process
      # substitution: `set -e` does not observe a process substitution's exit
      # status, so a failing generator would leave the loop with zero iterations
      # and this gate would pass having verified nothing.
      - name: Verify expected VSIX artifacts
        shell: bash
        run: |
          expected="$(node scripts/print-targets.mjs --vsix "$RELEASE_VERSION")"

          if [ -z "$expected" ]; then
            echo "::error::print-targets.mjs produced no artifact list."
            exit 1
          fi

          missing=0
          count=0
          while read -r file; do
            count=$((count + 1))
            if [ ! -f "$file" ]; then
              echo "::error::Missing VSIX artifact: $file"
              missing=1
            fi
          done <<< "$expected"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "All $count VSIX artifacts present."

      - name: Check VSIX size budget
        run: pnpm assert:vsix-size dist/vsix/*.vsix

      - name: Install git-cliff
        uses: taiki-e/install-action@v2.82.7
        with:
          tool: git-cliff

      - name: Generate changelog
        run: node scripts/generate-changelog.mjs "$RELEASE_VERSION" notes.md

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Dry run for Import Lens v${RELEASE_VERSION}"
            echo ""
            echo "All 6 VSIX artifacts present and within the size budget. Nothing was created or published."
            echo ""
            echo "| Destination | Selected |"
            echo "| --- | --- |"
            echo "| GitHub draft release | ${{ inputs.release_github }} |"
            echo "| Visual Studio Marketplace | ${{ inputs.publish_vscode }} |"
            echo "| Open VSX | ${{ inputs.publish_openvsx }} |"
            echo ""
            echo "### Changelog preview"
            echo ""
            cat notes.md
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run complete; see the job summary for the plan and changelog preview."

      # Converge rather than fail when the tag already carries a release, so a
      # run that died in a later publish step can simply be retried. The draft
      # flag is only set on creation: never silently unpublish a live release.
      - name: Create draft GitHub release
        if: ${{ !inputs.dry_run && inputs.release_github }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG exists; refreshing its notes and assets."
            gh release edit "$RELEASE_TAG" \
              --title "Import Lens $RELEASE_VERSION" \
              --notes-file notes.md
            gh release upload "$RELEASE_TAG" dist/vsix/*.vsix --clobber
          else
            gh release create "$RELEASE_TAG" dist/vsix/*.vsix \
              --draft \
              --target "$GITHUB_SHA" \
              --title "Import Lens $RELEASE_VERSION" \
              --notes-file notes.md
          fi

      # publish-vsix.mjs publishes each target with --skip-duplicate, retries
      # transient store failures, and keeps going past a bad target so one
      # platform's outage cannot strand the rest. Re-running is always safe.
      - name: Publish VSIXs to Visual Studio Marketplace
        if: ${{ !inputs.dry_run && inputs.publish_vscode }}
        run: node scripts/publish-vsix.mjs vsce dist/vsix/*.vsix

      - name: Publish VSIXs to Open VSX
        if: ${{ !inputs.dry_run && inputs.publish_openvsx }}
        run: node scripts/publish-vsix.mjs ovsx dist/vsix/*.vsix
