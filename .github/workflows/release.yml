name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Must match package.json."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node -e "const pkg = require('./package.json'); if (pkg.version !== process.env.RELEASE_VERSION) { console.error(`package.json version ${pkg.version} does not match release input ${process.env.RELEASE_VERSION}`); process.exit(1); }"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run tests
        run: pnpm test

  package:
    name: Package ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - target: win32-arm64
            os: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
          - target: linux-x64
            os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - target: darwin-x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
          - target: darwin-arm64
            os: macos-15
            rust-target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install 1.89.0 --profile minimal --target "${{ matrix.rust-target }}"
          rustup default 1.89.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VSIX
        run: pnpm run package:${{ matrix.target }}

      - name: Check VSIX size
        run: pnpm assert:vsix-size "import-lens-${{ matrix.target }}-${{ inputs.version }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: import-lens-${{ matrix.target }}-${{ inputs.version }}
          path: import-lens-${{ matrix.target }}-${{ inputs.version }}.vsix
          if-no-files-found: error
