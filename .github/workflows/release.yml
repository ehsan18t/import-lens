name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave blank to use package.json; must match a completed Build run."
        required: false
        type: string
      release_github:
        description: "Create the draft GitHub release."
        required: false
        default: true
        type: boolean
      publish_vscode:
        description: "Publish to the Visual Studio Marketplace (requires VSCE_PAT)."
        required: false
        default: false
        type: boolean
      publish_openvsx:
        description: "Publish to Open VSX (requires OVSX_PAT)."
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Validate and preview the changelog without creating or publishing anything."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 11.9.0

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL }}
      AI_MODEL: ${{ vars.AI_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      # Resolve the version once: a blank input falls back to package.json, a
      # value overrides it. Everything downstream keys off RELEASE_VERSION.
      - name: Resolve version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          version="$(node scripts/resolve-version.mjs "$REQUESTED_VERSION")"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"
          echo "Resolved release version: $version"

      # Fail fast, before any expensive download, if the request can't succeed.
      - name: Preflight
        run: |
          github='${{ inputs.release_github }}'
          vscode='${{ inputs.publish_vscode }}'
          openvsx='${{ inputs.publish_openvsx }}'

          if [ "$github" != "true" ] && [ "$vscode" != "true" ] && [ "$openvsx" != "true" ]; then
            echo "::error::No destination selected. Enable at least one of release_github, publish_vscode, publish_openvsx."
            exit 1
          fi

          if [ "$vscode" = "true" ] && [ -z "${VSCE_PAT:-}" ]; then
            echo "::error::publish_vscode is selected but the VSCE_PAT secret is not configured."
            exit 1
          fi

          if [ "$openvsx" = "true" ] && [ -z "${OVSX_PAT:-}" ]; then
            echo "::error::publish_openvsx is selected but the OVSX_PAT secret is not configured."
            exit 1
          fi

          echo "Preflight passed."

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Correlate to the Build run by the version-stamped artifact it produced,
      # not by run name (which no longer carries the version when the Build input
      # was left blank). Pick the newest matching run if a version was rebuilt.
      - name: Locate build run
        id: buildrun
        run: |
          artifact="import-lens-win32-x64-${RELEASE_VERSION}"
          # gh api rejects --slurp together with --jq, so emit one run id per
          # line (per page) and take the max across all pages with sort.
          run_id=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${artifact}" \
            --jq '.artifacts[].workflow_run.id' | sort -n | tail -n 1)
          if [ -z "$run_id" ]; then
            echo "::error::No Build artifact ${artifact} found. Run the Build workflow for ${RELEASE_VERSION} first."
            exit 1
          fi
          echo "Using build run $run_id."
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: import-lens-*-${{ env.RELEASE_VERSION }}
          path: dist/vsix
          merge-multiple: true
          run-id: ${{ steps.buildrun.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify expected VSIX artifacts
        run: |
          node --input-type=module <<'NODE'
          import { existsSync } from "node:fs";

          const targets = [
            "win32-x64",
            "win32-arm64",
            "linux-x64",
            "linux-arm64",
            "darwin-x64",
            "darwin-arm64",
          ];
          const missing = targets
            .map((target) => `dist/vsix/import-lens-${target}-${process.env.RELEASE_VERSION}.vsix`)
            .filter((file) => !existsSync(file));

          if (missing.length > 0) {
            console.error(`Missing VSIX artifacts:\n${missing.join("\n")}`);
            process.exit(1);
          }
          console.log("All 6 VSIX artifacts present.");
          NODE

      - name: Check VSIX size budget
        run: pnpm assert:vsix-size dist/vsix/*.vsix

      - name: Install git-cliff
        uses: taiki-e/install-action@v2.82.7
        with:
          tool: git-cliff

      - name: Generate changelog
        run: node scripts/generate-changelog.mjs "$RELEASE_VERSION" notes.md

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Dry run for ImportLens v${RELEASE_VERSION}"
            echo ""
            echo "All 6 VSIX artifacts present and within the size budget. Nothing was created or published."
            echo ""
            echo "| Destination | Selected |"
            echo "| --- | --- |"
            echo "| GitHub draft release | ${{ inputs.release_github }} |"
            echo "| Visual Studio Marketplace | ${{ inputs.publish_vscode }} |"
            echo "| Open VSX | ${{ inputs.publish_openvsx }} |"
            echo ""
            echo "### Changelog preview"
            echo ""
            cat notes.md
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run complete; see the job summary for the plan and changelog preview."

      - name: Create draft GitHub release
        if: ${{ !inputs.dry_run && inputs.release_github }}
        run: |
          gh release create "$RELEASE_TAG" dist/vsix/*.vsix \
            --draft \
            --target "$GITHUB_SHA" \
            --title "ImportLens $RELEASE_VERSION" \
            --notes-file notes.md

      - name: Publish VSIXs to Visual Studio Marketplace
        if: ${{ !inputs.dry_run && inputs.publish_vscode }}
        run: |
          for file in dist/vsix/*.vsix; do
            pnpm exec vsce publish --packagePath "$file" --pat "$VSCE_PAT"
          done

      - name: Publish VSIXs to Open VSX
        if: ${{ !inputs.dry_run && inputs.publish_openvsx }}
        run: |
          for file in dist/vsix/*.vsix; do
            pnpm exec ovsx publish "$file" --pat "$OVSX_PAT"
          done
