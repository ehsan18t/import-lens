name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Must match package.json."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 11.9.0
  RUST_VERSION: 1.89.0

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup default "${RUST_VERSION}"
          rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node -e "const pkg = require('./package.json'); if (pkg.version !== process.env.RELEASE_VERSION) { console.error(`package.json version ${pkg.version} does not match release input ${process.env.RELEASE_VERSION}`); process.exit(1); }"

      - name: Verify release icon
        run: |
          node -e "const fs = require('node:fs'); const pkg = require('./package.json'); if (pkg.icon && !fs.existsSync(pkg.icon)) { console.error(`release icon is declared at ${pkg.icon}, but the file does not exist`); process.exit(1); }"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run tests
        run: pnpm test

      - name: Run performance smoke test
        env:
          IMPORT_LENS_PERF_MULTIPLIER: 8
        run: pnpm test:performance

      - name: Check Rust coverage
        run: pnpm coverage:rust

  package-windows:
    name: Package ${{ matrix.target }}
    needs: validate
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            package-script: package:win32-x64
          - target: win32-arm64
            rust-target: aarch64-pc-windows-msvc
            package-script: package:win32-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install "$env:RUST_VERSION" --profile minimal --target "${{ matrix.rust-target }}"
          rustup default "$env:RUST_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VSIX
        run: pnpm run ${{ matrix.package-script }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: import-lens-${{ matrix.target }}-${{ inputs.version }}
          path: builds/import-lens-${{ matrix.target }}-${{ inputs.version }}.vsix
          if-no-files-found: error

  package-unix-cross:
    name: Package Linux and macOS
    needs: validate
    runs-on: ubuntu-24.04
    env:
      PACKAGE_SCRIPTS: package:linux-x64:zig package:linux-arm64:zig package:darwin-x64:zig package:darwin-arm64:zig

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Build package artifacts in Docker
        env:
          IMPORT_LENS_PERF_MULTIPLIER: 8
        run: pnpm docker:build

      - name: Upload Linux and macOS VSIX artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: import-lens-unix-${{ inputs.version }}
          path: |
            builds/import-lens-linux-x64-${{ inputs.version }}.vsix
            builds/import-lens-linux-arm64-${{ inputs.version }}.vsix
            builds/import-lens-darwin-x64-${{ inputs.version }}.vsix
            builds/import-lens-darwin-arm64-${{ inputs.version }}.vsix
          if-no-files-found: error

  release:
    name: Draft release and publish
    needs:
      - package-windows
      - package-unix-cross
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: v${{ inputs.version }}
      RELEASE_VERSION: ${{ inputs.version }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: import-lens-*-${{ inputs.version }}
          path: builds
          merge-multiple: true

      - name: Verify expected VSIX artifacts
        run: |
          node --input-type=module <<'NODE'
          import { existsSync } from "node:fs";

          const targets = [
            "win32-x64",
            "win32-arm64",
            "linux-x64",
            "linux-arm64",
            "darwin-x64",
            "darwin-arm64",
          ];
          const missing = targets
            .map((target) => `builds/import-lens-${target}-${process.env.RELEASE_VERSION}.vsix`)
            .filter((file) => !existsSync(file));

          if (missing.length > 0) {
            console.error(`Missing VSIX artifacts:\n${missing.join("\n")}`);
            process.exit(1);
          }
          NODE

      - name: Check VSIX size budget
        run: pnpm assert:vsix-size builds/*.vsix

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" builds/*.vsix \
            --draft \
            --target "$GITHUB_SHA" \
            --title "ImportLens $RELEASE_VERSION" \
            --notes "Draft release for ImportLens $RELEASE_VERSION."

      - name: Publish VSIXs to Visual Studio Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: |
          for file in builds/*.vsix; do
            pnpm exec vsce publish --packagePath "$file" --pat "$VSCE_PAT"
          done

      - name: Skip Visual Studio Marketplace publish
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "VSCE_PAT is not set; skipping Visual Studio Marketplace publish."
