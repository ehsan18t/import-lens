name: Validate

# Shared validation used by both CI (on push / PR) and Build (as a release gate).
# The heavier gates are opt-in so each caller runs only what it needs.
on:
  workflow_call:
    inputs:
      requested_version:
        description: "Version to resolve (blank falls back to package.json)."
        required: false
        default: ""
        type: string
      run_accuracy:
        description: "Run the accuracy comparison suite."
        required: false
        default: false
        type: boolean
      run_candidate_packages:
        description: "Run the real-package qualification suite (installs the pinned fixtures)."
        required: false
        default: false
        type: boolean
      run_performance:
        description: "Run the performance smoke test."
        required: false
        default: false
        type: boolean
      run_coverage:
        description: "Run the Rust coverage gate (installs cargo-llvm-cov)."
        required: false
        default: false
        type: boolean
    outputs:
      version:
        description: "The resolved version (requested input, or package.json)."
        value: ${{ jobs.validate.outputs.version }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # No version input: pnpm/action-setup reads packageManager from package.json.
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve version
        id: resolve
        env:
          REQUESTED_VERSION: ${{ inputs.requested_version }}
        run: |
          version="$(node scripts/resolve-version.mjs "$REQUESTED_VERSION")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      # Always the latest stable toolchain (rust-toolchain.toml pins the channel
      # and supplies rustfmt); no fixed version to fall behind. clippy is added
      # explicitly for the lint gate below.
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy

      - name: Add coverage tooling
        if: ${{ inputs.run_coverage }}
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: ${{ inputs.run_coverage }}
        uses: taiki-e/install-action@v2.82.7
        with:
          tool: cargo-llvm-cov@0.8.7

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1

      - name: Verify release icon
        run: |
          node -e "const fs = require('node:fs'); const pkg = require('./package.json'); if (pkg.icon && !fs.existsSync(pkg.icon)) { console.error(\`release icon is declared at \${pkg.icon}, but the file does not exist\`); process.exit(1); }"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2.0.20

      - name: Biome CI
        run: pnpm exec biome ci .

      - name: Run tests
        run: pnpm test

      # `daemon/tests/candidate_packages.rs` carries the correctness gates the
      # bundler redesign exists for -- zero dangling `__il_` bindings on
      # css-tree, tree-shaken modules present in `loaded_paths` on date-fns.
      # Every row is `#[ignore]`d and needs installed fixtures, so `pnpm test`
      # (`cargo test --workspace`, no `--ignored`) never reaches them. These two
      # steps are the only place they run automatically.
      - name: Install candidate fixtures
        if: ${{ inputs.run_candidate_packages }}
        run: |
          # The default runner shell is `bash -e`, without pipefail: a failed
          # install piped into `tail` would exit 0 and leave the gate running
          # against a workspace that was never created.
          set -o pipefail
          # The script shells out to `pnpm install` with inherited stdio, so the
          # workspace path is its LAST stdout line, not its only one. Network
          # access is confined to this step; the Rust suite below is offline.
          workspace="$(node scripts/prepare-candidate-fixtures.mjs "$RUNNER_TEMP/candidate-fixtures" | tail -n 1)"
          if [ -z "$workspace" ]; then
            echo "candidate fixture preparation printed no workspace path" >&2
            exit 1
          fi
          echo "IMPORT_LENS_FIXTURES_WORKSPACE=$workspace" >> "$GITHUB_ENV"
          echo "Candidate fixtures workspace: $workspace"

      - name: Run real-package qualification tests
        if: ${{ inputs.run_candidate_packages }}
        run: cargo test -p import-lens-daemon --locked --test candidate_packages -- --ignored

      # `daemon/tests/candidate_badges.rs` is the only place any real package's CLAIMS are
      # asserted: `side_effects`, `truly_treeshakeable` and `confidence` live on `ImportResult`,
      # which the engine-level suite above never builds, and the accuracy oracle compares bytes and
      # nothing else.
      - name: Run real-package badge baseline
        if: ${{ inputs.run_candidate_packages }}
        run: cargo test -p import-lens-daemon --release --locked --test candidate_badges -- --ignored --nocapture

      # The §10.6 absolute performance and memory gates: cold p95, daemon startup, cache-hit
      # response, idle RSS, and the 20-import batch. They are `#[ignore]`d and need the same
      # installed fixtures as the steps above -- and until now NOTHING invoked them, so the suite
      # written to protect this engine had never run once. `Run performance smoke test` below is a
      # DIFFERENT file (the legacy synthetic suite) and is not a substitute; it is also gated on
      # `run_performance`, which only `build.yml`'s workflow_dispatch ever sets. This step is gated
      # on `run_candidate_packages`, which `ci.yml` sets on every pull request -- which is the whole
      # point. `--release`: a debug-build timing gate is meaningless.
      - name: Run real-package performance gates
        if: ${{ inputs.run_candidate_packages }}
        env:
          # Shared CI hardware, same tolerance the legacy smoke test runs with. The memory gates are
          # absolute regardless.
          IMPORT_LENS_PERF_MULTIPLIER: 8
        # --test-threads=1: three timing gates that contend with each other are three noisy gates.
        run: cargo test -p import-lens-daemon --release --locked --test candidate_performance -- --ignored --nocapture --test-threads=1

      - name: Run performance smoke test
        if: ${{ inputs.run_performance }}
        env:
          IMPORT_LENS_PERF_MULTIPLIER: 8
        run: pnpm test:performance

      - name: Run accuracy tests
        if: ${{ inputs.run_accuracy }}
        env:
          # The suite skips its real-package benchmarks when they cannot be
          # downloaded. That is right for an offline laptop and wrong here: a
          # registry blip would turn the only minifier-drift gate into a no-op
          # while the job still went green.
          IMPORT_LENS_ACCURACY_REQUIRE_FIXTURES: "1"
        run: pnpm test:accuracy

      - name: Check Rust coverage
        if: ${{ inputs.run_coverage }}
        run: pnpm coverage:rust
