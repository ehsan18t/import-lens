# git-cliff configuration — deterministic release notes for ImportLens.
# Used by scripts/generate-changelog.mjs when AI_API_KEY is not set (or the AI call fails).
# Renders grouped, conventional-commit-based notes with no top-level header, so the output
# slots directly under a GitHub release title.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | split(pat="-->") | last | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}
{%- endfor %}
{% endfor %}"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^refactor", group = "<!-- 4 -->Refactoring" },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build\\(deps\\)", skip = true },
  { message = ".*", group = "<!-- 9 -->Other" },
]
