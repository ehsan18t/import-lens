# git-cliff configuration — deterministic release notes for Import Lens.
# Used by scripts/generate-changelog.mjs when AI_API_KEY is not set (or the AI call fails).
# Renders grouped, conventional-commit-based notes with no top-level header, so the output
# slots directly under a GitHub release title.

[changelog]
header = ""
# Breaking changes are rendered FIRST and separately, before the type groups. `protect_breaking_commits`
# only keeps them from being filtered out — without this block they render inside Features or Bug Fixes
# with the `!` invisible, which is how six breaking commits shipped as ordinary entries once.
body = """
{% set breaking = commits | filter(attribute="breaking", value=true) %}
{% if breaking | length > 0 %}
### Breaking Changes
{% for commit in breaking %}
- {{ commit.message | split(pat="\n") | first | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- if commit.breaking_description and commit.breaking_description != commit.message %}
  {{ commit.breaking_description | split(pat="

") | first | replace(from="
", to=" ") | trim | truncate(length=220) }}
{%- endif %}
{%- endfor %}
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | split(pat="-->") | last | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}{% if commit.breaking %} **(breaking)**{% endif %} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^refactor", group = "<!-- 4 -->Refactoring" },
  # Reverts are user-visible: something that shipped no longer behaves that way, and a reader of the
  # changelog needs to see it as plainly as the change that introduced it.
  { message = "^revert", group = "<!-- 5 -->Reverts" },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build\\(deps\\)", skip = true },
  { message = ".*", group = "<!-- 9 -->Other" },
]
